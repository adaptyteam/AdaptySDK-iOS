$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://adapty.io/ui/5_0_0/schema"
title: "AdaptyUI Configuration"
type: object
required: [format, screens, scripts]
properties:
  format:
    type: string
    const: "5.0.0-SNAPSHOT"
  assets:
    title: "Default assets"
    $ref: "#/Assets"
  localizations:
    title: "Localizations"
    type: array
    items: { $ref: "#/Localization" }
    uniqueItems: true
    minItems: 1
  default_localization:
    title: "Default localizations locale identifier"
    $ref: "#/Localization/Identifier"
  templates:
    title: "Templates"
    type: object
    additionalProperties: { $ref: "#/Template" }
  navigators:
    title: "Navigators"
    type: object
    properties:
      default: 
        $ref: "#/Navigator"
        default: {
          "background": "#000000FF",
          "content": { "type": "screen_holder" },
          "order": 0
        }
    additionalProperties: { $ref: "#/Navigator" }
  screens:
    title: "Screens"
    type: object
    additionalProperties: { $ref: "#/Screen" }
  scripts:
    type: array
    items: { $ref: "#/Script" }
    uniqueItems: true
additionalProperties: false

###### Entities ######

Entities:

  VerticalAlignment:
    type: string
    enum:
      - top
      - center
      - bottom

  HorizontalAlignment:
    type: string
    enum:
      - leading
      - trailing
      - left
      - center
      - right
      - justified

  AspectRatio:
    title: "Aspect ratio"
    type: string
    enum:
      - fit
      - fill
      - stretch

  CornerRadius:
    title: "Corner radius"
    oneOf:
      - type: number
        description: "Same radius for all corners"
      - type: array
        items: { type: number }
        description: "[top_leading,top_trailing,bottom_trailing,bottom_leading], default: 0"
      - type: object
        properties:
          top_leading:
            title: "Top leading corner radius"
            type: number
            default: 0
          top_trailing:
            title: "Top trailing corner radius"
            type: number
            default: 0
          bottom_trailing:
            title: "Bottom trailing corner radius"
            type: number
            default: 0
          bottom_leading:
            title: "Bottom leading corner radius"
            type: number
            default: 0
        additionalProperties: false

  EdgeInsets:
    title: "Edge Insets"
    oneOf:
      - $ref: "#/Entities/Unit"
      - type: array
        items: { $ref: "#/Entities/Unit" }
        description: "[], default 0;  [allEdges]; [verticalEdges,horizontalEdges]; [leading,top,trailing,bottom], default 0"
      - type: object
        properties:
          top: { $ref: "#/Entities/Unit", default: 0 }
          leading: { $ref: "#/Entities/Unit", default: 0 }
          bottom: { $ref: "#/Entities/Unit", default: 0 }
          trailing: { $ref: "#/Entities/Unit", default: 0 }
        additionalProperties: false

  Point:
    title: Point
    oneOf:
      - type: array
        items: { type: number }
        description: "[y,x], default 0"
      - type: object
        properties:
          y: { type: number, default: 0 }
          x: { type: number, default: 0 }
        additionalProperties: false

  Offset:
    title: Offset
    oneOf:
      - { $ref: "#/Entities/Unit", description: "y value, x:0" }
      - type: array
        items: { $ref: "#/Entities/Unit" }
        description: "[] => y:0,x:0, [y] => x:0, [y,x]"
      - type: object
        properties:
          y: { $ref: "#/Entities/Unit", default: 0 }
          x: { $ref: "#/Entities/Unit", default: 0 }
        additionalProperties: false

  Unit:
    title: Unit
    oneOf:
      - type: number
        description: "Value in points"
      - type: object
        required: [point]
        properties:
          point: { type: number, title: "Value in points" }
        additionalProperties: false
      - type: object
        required: [screen]
        properties:
          screen: { type: number, title: "Value in parts of the screen" }
        additionalProperties: false
      - type: object
        required: [safe_area]
        properties:
          safe_area: { enum: [start, end] }
        additionalProperties: false
      - type: object
        required: [value]
        properties:
          value: { type: number }
          unit: { enum: [point, screen], default: point }
        additionalProperties: false

###### Animations ######

Animation:
  type: object
  allOf:
    - properties:
        interpolator:
          $ref: "#/Animation/Interpolator"
          default: ease_in_out
        start_delay:
          type: integer
          default: 0
          description: milliseconds
        duration: 
          type: integer
          default: 300
          description: milliseconds
        loop: { enum: [normal, ping_pong] }
        loop_delay: 
          type: integer
          default: 0
          description: milliseconds
        ping_pong_delay:
          type: integer
          default: 0
          description: milliseconds
        loop_count: { type: integer }
    - oneOf:
        - $ref: "#/Animation/Opacity" 
        - $ref: "#/Animation/Offset" 
        - $ref: "#/Animation/Rotation"
        - $ref: "#/Animation/Scale"
        - $ref: "#/Animation/Box"
        - $ref: "#/Animation/Background"
        - $ref: "#/Animation/Border"
        - $ref: "#/Animation/Shadow"
  additionalProperties: false

  Interpolator:
    oneOf:
      - type: string
        enum:
          - ease_in_out
          - ease_in
          - ease_out
          - linear
          - ease_in_elastic
          - ease_out_elastic
          - ease_in_out_elastic
          - ease_in_bounce
          - ease_out_bounce
          - ease_in_out_bounce
      - type: array
        items: { type: number }
        description: "[x1, y1, x2, y2] 4 numbers used for 2 point Cubic-Bezier curve"
        minItems: 4
        maxItems: 4
    default: ease_in_out

  Opacity:
    type: object
    required: [type]
    properties:
      type: { const: opacity }
      opacity:
        type: object
        required: [start, end]
        properties:
          start: { type: number }
          end: { type: number }
        default: { "start": 0, "end": 1 }
        additionalProperties: false
    additionalProperties: false

  Offset:
    type: object
    required: [type, offset]
    properties:
      type: { const: offset }
      offset:
        type: object
        required: [start, end]
        properties:
          start: { $ref: "#/Entities/Offset" }
          end: { $ref: "#/Entities/Offset" }
        additionalProperties: false
    additionalProperties: false

  Rotation:
    type: object
    required: [type, angle]
    properties:
      type: { const: rotation }
      angle:
        type: object
        required: [start, end]
        properties:
          start: { type: number, description: "degrees" }
          end: { type: number, description: "degrees" }
        additionalProperties: false
      anchor: { $ref: "#/Entities/Point", default: [0.5, 0.5] }
    additionalProperties: false

  Scale:
    type: object
    required: [type, scale]
    properties:
      type: { const: scale }
      scale:
        type: object
        required: [start, end]
        properties:
          start: { $ref: "#/Entities/Point" }
          end: { $ref: "#/Entities/Point" }
        additionalProperties: false
      anchor: { $ref: "#/Entities/Point", default: [0.5, 0.5] }
    additionalProperties: false

  Box:
    type: object
    required: [type]
    properties:
      type: { const: box }
    anyOf:
      - required: [width]
        properties:
          width:
            type: object
            required: [start, end]
            properties:
              start: { $ref: "#/Entities/Unit" }
              end: { $ref: "#/Entities/Unit" }
            additionalProperties: false
      - required: [height]
        properties:
          height:
            type: object
            required: [start, end]
            properties:
              start: { $ref: "#/Entities/Unit" }
              end: { $ref: "#/Entities/Unit" }
            additionalProperties: false
    additionalProperties: false

  Background:
    type: object
    required: [type, color]
    properties:
      type: { const: background }
      color:
        type: object
        required: [start, end]
        properties:
          start: { $ref: "#/AssetIdOrColor/Binding"}
          end: { $ref: "#/AssetIdOrColor/Binding"}
        additionalProperties: false
    additionalProperties: false

  Border:
    type: object
    required: [type]
    properties:
      type: { const: border }
    anyOf:
      - required: [color]
        properties:
          color:
            type: object
            required: [start, end]
            properties:
              start: { $ref: "#/AssetIdOrColor/Binding" }
              end: { $ref: "#/AssetIdOrColor/Binding" }
            additionalProperties: false
      - required: [thickness]
        properties:
          thickness:
            type: object
            required: [start, end]
            properties:
              start: { type: number }
              end: { type: number }
            additionalProperties: false
    additionalProperties: false

  Shadow:
    type: object
    required: [type]
    properties:
      type: { const: shadow }
    anyOf:
      - required: [color]
        properties:
          color:
            type: object
            required: [start, end]
            properties:
              start: { $ref: "#/AssetIdOrColor/Binding" }
              end: { $ref: "#/AssetIdOrColor/Binding" }
            additionalProperties: false
      - required: [blur_radius]
        properties:
          blur_radius:
            type: object
            required: [start, end]
            properties:
              start: { type: number }
              end: { type: number }
            additionalProperties: false
      - required: [offset]
        properties:
          offset:
            type: object
            required: [start, end]
            properties:
              start: { $ref: "#/Entities/Offset" }
              end: { $ref: "#/Entities/Offset" }
            additionalProperties: false
    additionalProperties: false

  Transition.Slide:
    type: object
    required: [type]
    properties:
      type: { const: slide }
      start_delay: { type: integer, default: 0 }
      duration: { type: integer, default: 300 }
      interpolator:
        { $ref: "#/Animation/Interpolator", default: ease_in_out }
    additionalProperties: false

###### Navigators ######

Navigator:
  type: object
  required: [background, order]
  properties:
    background: { $ref: "#/AssetIdOrColor/Binding" }
    content:
      $ref: "#/UI/Element"
      default: { $ref: "#/Screen/Holder" }
    order: { type: integer }
    default_screen_actions:
      type: object
      properties:
        on_outside_tap: { $ref: "#/Script/ActionOrArray" }
        on_device_back: { $ref: "#/Script/ActionOrArray" }
      additionalProperties: false
    appearances:
      type: object
      properties:
        on_appear: { $ref: "#/Navigator/Appearance" }
        on_disappear: { $ref: "#/Navigator/Appearance" }
      additionalProperties: { $ref: "#/Navigator/Appearance" }
    transitions:
      type: object
      properties:
        forward: { $ref: "#/Navigator/ScreenTransition" }
        backward: { $ref: "#/Navigator/ScreenTransition" }
      additionalProperties: { $ref: "#/Navigator/ScreenTransition" }
    
  Appearance:
    type: object
    properties:
      background: { $ref: "#/Animation/Background" }
      content:
        type: array
        items: { $ref: "#/Animation" }
        uniqueItems: true
        minItems: 1
    additionalProperties: false

  ScreenTransition:
    type: object
    required: [is_incoming_on_top]
    properties:
      outgoing:
        type: array
        items: { $ref: "#/Animation" }
        uniqueItems: true
        minItems: 1
      incoming:
        type: array
        items: { $ref: "#/Animation" }
        uniqueItems: true
        minItems: 1
      is_incoming_on_top: { type: boolean }
    additionalProperties: false

###### Screens ######

Screen:
  type: object
  required: [content]
  properties:
    cover: { $ref: "#/UI/Box" }
    content: { $ref: "#/UI/Element" }
    footer: { $ref: "#/UI/Element" }
    layout_behaviour:
      type: string
      enum: [default, flat, hero, transparent]
      default: default
    on_outside_tap: { $ref: "#/Script/ActionOrArray" }
    on_device_back: { $ref: "#/Script/ActionOrArray" }
  additionalProperties: false

  Holder:
    title: "Placeholder for screen content inside navigator"
    type: object
    required: [type]
    properties:
      type: { const: "screen_holder" }
    additionalProperties: false

###### Templates ######

Template:
  type: object
  required: [content]
  properties:
    content: { $ref: "#/UI/Element" }
  additionalProperties: false

  Child:
    title: "Template child placeholder"
    type: object
    required: [type, name]
    properties:
      type: { const: "child" }
      name: { type: string }
    additionalProperties: false

  Reference:
    title: "Template reference"
    type: object
    required: [type]
    properties:
      type: { type: string, pattern: '^#' }
    additionalProperties: false

###### UI Components ######

UI:

  Element:
    type: object
    required: [type]
    oneOf:
      - $ref: "#/Template/Reference"
      - $ref: "#/Template/Child"
        description: Allowed use only in Template
      - $ref: "#/Screen/Holder"
        description: Allowed use only in Navigator
      - $ref: "#/UI/If.Then.Else"
      - allOf:
          - oneOf:
              - $ref: "#/UI/Image"
              - $ref: "#/UI/Video"
              - $ref: "#/UI/Text"
              - $ref: "#/UI/TextField"
              - $ref: "#/UI/Toggle"
              - $ref: "#/UI/Slider"
              - $ref: "#/UI/Button"
              - $ref: "#/UI/Stack"
              - $ref: "#/UI/Box"
              - $ref: "#/UI/Section"
              - $ref: "#/UI/Row"
              - $ref: "#/UI/Column"
              - $ref: "#/UI/Timer"
              - $ref: "#/UI/Pager"
          - properties:
              decorator: { $ref: "#/UI/Element/Decorator" }
              padding: { $ref: "#/Entities/EdgeInsets", default: 0 }
              offset: { $ref: "#/Entities/Offset", default: 0 }
              opacity: { type: number, default: 1.0 }
              on_appear:
                type: array
                items: { $ref: "#/Animation" }
                uniqueItems: true
                minItems: 1
        additionalProperties: false

    Decorator:
      title: "Decorator for any element"
      type: object
      properties:
        background: { $ref: "#/AssetIdOrColor/Binding" }
        type: { $ref: "#/UI/Element/Decorator/ShapeType", default: rect }
        border: { $ref: "#/AssetIdOrColor/Binding" }
        shadow: { $ref: "#/UI/Element/Decorator/Shadow" }
      dependentSchemas:
        border:
          properties:
            thickness: { type: number, default: 1 }
      if:
        properties:
          type: { const: rect }
      then:
        properties:
          rect_corner_radius: { $ref: "#/Entities/CornerRadius", default: 0 }
      additionalProperties: false

      ShapeType:
        title: "Shape type"
        type: string
        enum:
          - circle
          - rect
          - curve_up
          - curve_down

      Shadow:
        title: "Shadow"
        type: object
        required: [color]
        properties:
          color: { $ref: "#/AssetIdOrColor/Binding" }
          blur_radius:
            type: number
            default: 0
            description: "A measure of how much to blur the shadow. Larger values result in more blur."
          offset: { $ref: "#/Entities/Offset", default: [0, 0] }
        additionalProperties: false

  If.Then.Else:
    type: object
    required: [type, then, else]
    properties:
      type: { const: if }
      platform: { enum: [ios, android] }
      os_version:
        type: string
        pattern: "^[0-9]+\\.[0-9]+$"
        description: "Minimum OS version (inclusive)"
      version:
        { type: string, pattern: "^[0-9]+(\\.[0-9]+){0,2}(-[A-Za-z0-9._]+)?$" }
      to_version:
        { type: string, pattern: "^[0-9]+(\\.[0-9]+){0,2}(-[A-Za-z0-9._]+)?$" }
      then: { $ref: "#/UI/Element" }
      else: { $ref: "#/UI/Element" }
    additionalProperties: false


  Box:
    type: object
    required: [type]
    properties:
      type: { const: box }
      height: { $ref: "#/UI/Box/Length" }
      width: { $ref: "#/UI/Box/Length" }
      h_align: 
        $ref: "#/Entities/HorizontalAlignment"
        default: center
      v_align: 
        $ref: "#/Entities/VerticalAlignment"
        default: center 
      content: { $ref: "#/UI/Element" }

    Length:
      oneOf:
        - title: Fixed length
          $ref: "#/Entities/Unit"
        - title: Fill max
          type: object
          required: [fill_max]
          properties:
            fill_max: { type: boolean, const: true }
          additionalProperties: false
        - title: Set min, and optional max
          type: object
          required: [min]
          properties:
            min: { $ref: "#/Entities/Unit" }
            max: { $ref: "#/Entities/Unit" }
          additionalProperties: false
        - title: Set shrink, and optional max
          type: object
          required: [shrink]
          properties:
            shrink: { $ref: "#/Entities/Unit" }
            max: { $ref: "#/Entities/Unit" }
          additionalProperties: false

  Image:
    type: object
    required: [type, asset_id]
    properties:
      type: { const: "image" }
      asset_id: { $ref: "#/AssetId/Binding" }
      aspect:
        $ref: "#/Entities/AspectRatio"
        default: fit
      tint: { $ref: "#/AssetIdOrColor/Binding" }

  Video:
    type: object
    required: [type, asset_id]
    properties:
      type: { const: "video" }
      asset_id: { $ref: "#/AssetId/Binding" }
      aspect:
        $ref: "#/Entities/AspectRatio"
        default: fit
      loop: { type: boolean, default: true }

  Text:
    type: object
    allOf:
      - required: [type, string_id]
        properties:
          type: { const: "text" }
          string_id: { $ref: "#/Localization/StringId/Binding" }
          align: { $ref: "#/Entities/HorizontalAlignment", default: leading }
          max_rows: { type: integer, minimum: 1 }
          on_overflow:
            anyOf:
              - $ref: "#/UI/Text/OverflowMode"
              - type: array
                items: { $ref: "#/UI/Text/OverflowMode" }
                uniqueItems: true
                minItems: 1
      - $ref: "#/UI/Text/Attributes"

    OverflowMode:
      type: string
      enum:
        - scale

    Attributes:
      title: Attributes for RichText
      type: object
      properties:
        font: 
          title: "Font Asset identifier"
          $ref: "#/AssetId/Binding"
        size: 
          title: "Font size"
          type: number
        strike: 
          type: boolean
        underline:
          type: boolean 
        color: 
          title: "Text color[-gradient] Asset identifier" 
          $ref: "#/AssetIdOrColor/Binding"
        background:
          title: Background color of text
          $ref: "#/AssetIdOrColor/Binding"
        tint:
          title: Tint color of image
          $ref: "#/AssetIdOrColor/Binding"
      additionalProperties: false


  TextField:
    type: object
    allOf:
      - required: [type, value]
        properties:
          type: { const: "text_field" }
          value: { $ref: "#/Script/DataBinding" }
          align: { $ref: "#/Entities/HorizontalAlignment", default: leading }
          max_rows: { type: integer, minimum: 1 }
          on_overflow:
            anyOf:
              - $ref: "#/UI/Text/OverflowMode"
              - type: array
                items: { $ref: "#/UI/Text/OverflowMode" }
                uniqueItems: true
                minItems: 1
      - $ref: "#/UI/Text/Attributes"

  Toggle:
    type: object
    required: [type, value]
    properties:
      type: { const: toggle }
      color: { $ref: "#/AssetIdOrColor/Binding" }
      value: { $ref: "#/Script/DataBinding" }

  Slider:
    type: object
    required: [type, value, min, max]
    properties:
      type: { const: slider }
      value: { $ref: "#/Script/DataBinding", title: "Two-way data binding to number" }
      min: { type: number }
      max: { type: number }
      step: { type: number }

  Button:
    type: object
    required: [type, action, normal]
    properties:
      type: { const: button }
      action: { $ref: "#/Script/ActionOrArray" }
      normal: { $ref: "#/UI/Element" }
      selected: { $ref: "#/UI/Element" }
      is_selected: { $ref: "#/Script/DataBinding", title: "One-way data binding to boolean"}

  Stack:
    type: object
    required: [type, content]
    properties:
      type: { enum: [ v_stack, h_stack, z_stack] }
      h_align: { $ref: "#/Entities/HorizontalAlignment", default: center }
      v_align: { $ref: "#/Entities/VerticalAlignment", default: center }
      spacing: { type: number, default: 0 }
      content:
        title: "Child elements"
        type: array
        minItems: 1
        items:
          oneOf:
            - $ref: "#/UI/Stack/Space"
            - $ref: "#/UI/Element"

    Space:
      title: "Space in stack"
      type: object
      properties:
        type: { const: space }
        count: { type: integer, default: 1, minimum: 1 }
      additionalProperties: false

  Section:
    type: object
    required: [type, index, content]
    properties:
      type: { const: section }
      index: { $ref: "#/Script/DataBinding", title: "One-way data binding to integer"}
      content:
        type: array
        minItems: 1
        items: { $ref: "#/UI/Element" }

  Row:
    type: object
    required: [type, items]
    properties:
      type: { const: row }
      spacing: { type: number, default: 0 }
      items:
        type: array
        minItems: 1
        items: { $ref: "#/UI/GridItem" }

  Column:
    type: object
    required: [type, items]
    properties:
      type: { const: column }
      spacing: { type: number, default: 0 }
      items:
        type: array
        minItems: 1
        items: { $ref: "#/UI/GridItem" }

  GridItem:
    type: object
    required: [type, content]
    allOf:
      - oneOf:
          - required: [fixed]
            properties:
              fixed: { $ref: "#/Entities/Unit" }
          - required: [weight]
            properties:
              weight: { type: integer }
      - properties:
          type: { const: grid_item }
          h_align: { $ref: "#/Entities/HorizontalAlignment", default: center }
          v_align: { $ref: "#/Entities/VerticalAlignment", default: center }
          content: { $ref: "#/UI/Element" }
    additionalProperties: false

  Timer:
    type: object
    allOf:
      - required: [type, id, format]
        properties:
          type: { const: timer }
          id: { type: string }
          format:
            oneOf:
              - type: string
              - type: array
                minItems: 1
                items:
                  type: object
                  required: [from, string_id]
                  properties:
                    from: { type: number }
                    string_id: { type: string }
          align: { $ref: "#/Entities/HorizontalAlignment", default: leading }
          action: { $ref: "#/Script/ActionOrArray" }
      - oneOf:
          - required: [end_time, behaviour]
            properties:
              end_time:
                type: string
                pattern: "^[0-9]{4}-((0[1-9])|(1[012]))-(([0-2][1-9])|(3[01])) (([01][0-9])|(2[0123])):([0-5][0-9]):([0-5][0-9])$"
              behaviour:
                type: string
                enum:
                  - end_at_utc_time
                  - end_at_local_time
          - required: [duration, behaviour]
            properties:
              duration: { type: number, description: seconds }
              behaviour:
                enum:
                  - start_at_every_appear
                  - start_at_first_appear
                  - start_at_first_appear_persisted
                  - custom
                default: start_at_first_appear
      - $ref: "#/UI/Text/Attributes"

  Pager:
    type: object
    required: [type, content]
    properties:
      type: { const: pager }
      page_width: 
        $ref: "#/UI/Pager/Length"
        default: { parent: 1 }
      page_height: 
        $ref: "#/UI/Pager/Length"
        default: { parent: 1 } 
      page_padding: { $ref: "#/Entities/EdgeInsets" }
      spacing: { type: number, default: 0 }
      content:
        type: array
        minItems: 1
        items: { $ref: "#/UI/Element" }
      page_control:
        type: object
        properties:
          layout: { enum: [overlaid, stacked] }
          v_align: { $ref: "#/Entities/VerticalAlignment", default: bottom }
          padding: { $ref: "#/Entities/EdgeInsets", default: 6 }
          dot_size: { type: number, default: 6 }
          spacing: { type: number, default: 6 }
          color:  { $ref: "#/AssetIdOrColor/Binding" }
          selected_color: { $ref: "#/AssetIdOrColor/Binding" }
        additionalProperties: false
      animation:
        type: object
        properties:
          start_delay: { type: number, default: 0 }
          page_transition:
            $ref: "#/Animation/Transition.Slide"
            default: { type: slide } 
          repeat_transition: { $ref: "#/Animation/Transition.Slide" }
          after_interaction_delay: { type: number, default: 3000 }
        additionalProperties: false
      interaction:
        type: string
        enum:
          - none
          - cancel_animation
          - pause_animation
        default: pause_animation

    Length:
      oneOf:
        - $ref: "#/Entities/Unit"
          description: "Fixed length"
        - type: object
          required: [parent]
          additionalProperties: false
          properties:
            parent: { type: number }

###### Rich Text ######

RichText:
  oneOf:
    - $ref: "#/RichText/Item"
    - type: array
      items: { $ref: "#/RichText/Item" }
      minItems: 1

  Item:
    oneOf:
      - $ref: "#/RichText/Text"
      - $ref: "#/RichText/Tag"
      - $ref: "#/RichText/Image"

  Text:
    title: Text item in RichText
    oneOf:
      - type: string
        title: Text
      - type: object
        required: [text]
        properties:
          text: { title: Text, type: string }
          attributes: { $ref: "#/RichText/Attributes" }
          action: { $ref: "#/Script/Action" }
        additionalProperties: false

  Tag:
    title: Tag item in RichText
    type: object
    required: [tag]
    properties:
      tag: { type: string, title: "Tag value" }
      attributes: { $ref: "#/RichText/Attributes" }
      action: { $ref: "#/Script/Action" }
    additionalProperties: false

  Image:
    title: Image item in RichText
    type: object
    required: [image]
    properties:
      image: { type: string, title: "Image asset identifier" }
      attributes: { $ref: "#/RichText/Attributes" }
    additionalProperties: false

  Attributes:
    title: Attributes for RichText
    type: object
    properties:
      font: 
        title: "Font Asset identifier"
        $ref: "#/AssetId"
      size: 
        title: "Font size"
        type: number
      strike: 
        type: boolean
      underline:
        type: boolean 
      color: 
        title: "Text color[-gradient] Asset identifier" 
        $ref: "#/AssetIdOrColor"
      background:
        title: Background color of text
        $ref: "#/AssetIdOrColor"
      tint:
        title: Tint color of image
        $ref: "#/AssetIdOrColor"
    additionalProperties: false

###### Localization ######

Localization:
  title: Localization by locale identifier
  type: object
  required: [id]
  properties:
    id: { $ref: "#/Localization/Identifier" }
    is_right_to_left: { type: boolean, default: false }
    assets: { $ref: "#/Assets" }
    strings:
      type: array
      items: { $ref: "#/Localization/String" }
      uniqueItems: true
      minItems: 1
  additionalProperties: false

  Identifier:
    type: string
    pattern: "^[a-z]{2,4}([_-][A-Z][a-z]{3})?([_-]([A-Z]{2,3}|[0-9]{3}))?$"
    examples:
      - en-Latn-US
      - ru-Cyrl-RU

  String:
    type: object
    required: [id, value]
    properties:
      id:
        title: Localized string identifier
        type: string
      value: { $ref: "#/RichText" }
      fallback: { $ref: "#/RichText" }
    additionalProperties: false

  StringId:
    Binding:
      oneOf:
        - title: Localization string id
          type: string
        - title: Localization string id with values tags
          $ref: "#/Localization/StringIdWithTagValues/Binding"
        - title: One way binding to localization string id
          $ref: "#/Script/DataBinding"
        - title: Product string id
          $ref: "#/Localization/ProductStringId/Binding"

  StringIdWithTagValues:
    Binding:
      type: object
      required: [string_id]
      properties:
        string_id: { type: string }
      additionalProperties:
        oneOf:
          - title: String value
            type: string
          - title: One way binding to string value
            $ref: "#/Script/DataBinding"

  ProductStringId:
    Binding:
      type: object
      required: [product]
      properties:
        product:
          oneOf:
            - title: Adapty product id
              type: string
            - title: One way binding to Adapty product id
              $ref: "#/Script/DataBinding"
        suffix: { type: string }
      additionalProperties: false

###### Assets ######

Assets:
  type: array
  items: { $ref: "#/Assets/Asset" }
  uniqueItems: true
  minItems: 1

  Asset:
    title: Asset
    type: object
    required: [id, type]
    properties:
      id:
        title: Asset identifier
        type: string
      custom_id:
        title: User asset identifier
        type: string
    oneOf:
      - $ref: "#/Assets/Color"
      - $ref: "#/Assets/ColorGradient"
      - $ref: "#/Assets/Font"
      - $ref: "#/Assets/Image"
      - $ref: "#/Assets/Video"
    additionalProperties: false

  Color:
    title: Color asset
    type: object
    required: [type, value]
    properties:
      type: { const: color }
      value: { $ref: "#/Assets/Color/HexString" }
    additionalProperties: false

    HexString:
      title: "Color #RRGGBBAA"
      type: string
      pattern: "^#([A-Fa-f0-9]{6}|[A-Fa-f0-9]{8})$"

  ColorGradient:
    title: Color gradient asset
    type: object
    required: [type, values, points]
    properties:
      type:
        type: string
        enum:
          - linear-gradient
          - radial-gradient
          - conic-gradient
      values:
        type: array
        items:
          type: object
          required: [color, p]
          properties:
            color: { $ref: "#/Assets/Color/HexString" }
            p: { type: number }
        minItems: 1
      points:
        type: object
        required: [x0, y0, x1, y1]
        properties:
          x0: { type: number }
          y0: { type: number }
          x1: { type: number }
          y1: { type: number }
    additionalProperties: false

  Font:
    title: Font asset
    type: object
    required: [type, value]
    properties:
      type: { const: font }
      value:
        title: font alias for ios only
        oneOf:
          - type: string
          - type: array
            items: { type: string }
            minItems: 1
            uniqueItems: true
      resources:
        title: Resource name for android only
        type: array
        items: { type: string }
        uniqueItems: true
        minItems: 1
      family_name:
        oneOf:
          - type: string
            default: adapty_system
          - type: array
            items: { type: string }
            minItems: 1
            uniqueItems: true
      weight: { type: integer, minimum: 0, default: 400 }
      italic: { type: boolean, default: false }
      size: { type: number, default: 15 }
      color: { $ref: "#/Assets/Color/HexString", default: "#000000FF" }
    additionalProperties: false

  Image:
    title: Image asset
    type: object
    allOf:
      - required: [type]
        properties:
          type: { const: image }
      - $ref: "#/Assets/Image/Data"
    additionalProperties: false

    Data:
      type: object
      oneOf:
        - title: Base64 encoded image
          required: [value]
          properties:
            value: { type: string, contentEncoding: base64 }
        - title: URL to image
          required: [url, preview_value]
          properties:
            url: { type: string }
            preview_value: { type: string, contentEncoding: base64 }

  Video:
    title: Video asset
    type: object
    required: [type, url, image]
    properties:
      type: { const: video }
      url: { type: string }
      image: { $ref: "#/Assets/Image/Data" }
    additionalProperties: false

AssetId:
  title: Asset identifier
  type: string

  Binding:
     oneOf:
      - $ref: "#/AssetId"
      - title: One way binding to asset identifier
        $ref: "#/Script/DataBinding"

AssetIdOrColor:
  oneOf:
    - $ref: "#/AssetId"
    - $ref: "#/Assets/Color/HexString"

  Binding:
    oneOf:
      - $ref: "#/AssetId"
      - $ref: "#/Assets/Color/HexString"
      - title: One way binding to asset identifier or color hex string
        $ref: "#/Script/DataBinding"


###### Scripts, Actions & Data Binding ######

Script:
  title: "Script code block"
  type: object
  required: [content]
  properties:
    type: { type: string, default: "js" }
    content: { type: string }
  additionalProperties: false

  Action:
    title: "Action calling a Script method"
    type: object
    required: [func]
    properties:
      func:
        type: string
        description: "Path to Script method (dot-separated)"
      params:
        type: object
        default: {}
        description: "Parameters passed to the method"
      scope:
        type: string
        enum: [global, screen]
        default: screen
    additionalProperties: false

  ActionOrArray:
    title: "Single action or array of actions"
    oneOf:
      - $ref: "#/Script/Action"
      - type: array
        items: { $ref: "#/Script/Action" }
        uniqueItems: true
        minItems: 1

  DataBinding:
    title: "Binding to a Script variable"
    type: object
    required: [var]
    properties:
      var:
        type: string
        description: "Path to Script property (dot-separated)"
      setter:
        type: string
        description: "Alternative setter method name for two-way binding"
      scope:
        type: string
        enum: [global, screen]
        default: screen
      converter: { enum: [is_equal] }
      converter_params: 
        oneOf:
          - type: string
          - type: boolean
          - type: number
          - type: object
            additionalProperties:
              oneOf:
              - type: string
              - type: boolean
              - type: number
    additionalProperties: false